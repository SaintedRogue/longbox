		<title>Longbox</title>
		<script>
			try {
				const zustandState = JSON.parse(
					localStorage.getItem('longbox-user-store') ||
						localStorage.getItem('stump-user-store') ||
						'{"state": {}}',
				).state
				const locale = zustandState.userPreferences?.locale
				if (typeof locale === 'string' && locale.length > 0) {
					document.documentElement.lang = locale
				}
				let appTheme = (zustandState.userPreferences?.appTheme || '').toLowerCase()
				if (appTheme === 'system') {
					const prefersDark = globalThis.matchMedia('(prefers-color-scheme: dark)')
					appTheme = prefersDark.matches ? 'dark' : 'light'
				}
				const alreadyHasTheme =
					!appTheme || document.querySelector('html').classList.contains(appTheme)
				if (!alreadyHasTheme) {
					document.querySelector('html').classList.add(appTheme)
				}
			} catch {}
		</script>

	<body class="font-inter">
		<script>
			try {
				const zustandState = JSON.parse(
					localStorage.getItem('longbox-user-store') ||
						localStorage.getItem('stump-user-store') ||
						'{"state": {}}',
				).state
				const appFont = zustandState.userPreferences?.appFont
				if (typeof appFont === 'string' && appFont.length > 0) {
					const fontSuffix = appFont.toLowerCase().replace(/_/g, '')
					if (fontSuffix !== 'inter') {
						document.body.classList.remove('font-inter')
						document.body.classList.add('font-' + fontSuffix)
					}
				}
			} catch {}
		</script>
