name: Binary release

on:
  # only runs when a release/v* branch is merged into main (resolve-version step)
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.head.ref, 'release/v'))
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(echo "${{ github.event.pull_request.head.ref }}" | sed -e 's/release\/v//')" >> $GITHUB_OUTPUT
          fi

      - name: Print version
        run: echo "Building release for v${{ steps.resolve.outputs.version }}"

  # build the common webapp HTML/JS/CSS used for all platforms
  build-webapp:
    needs: [resolve-version]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build web application/upload artifact
        uses: ./.github/actions/build-web

  # build the server binary for each supported platform
  build-binary:
    needs: [resolve-version, build-webapp]
    strategy:
      matrix:
        # See https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources
        # Note: macos-15-intel is x86_64, available until Aug 2027. See https://github.com/actions/runner-images/issues/13045
        os: [ubuntu-22.04, macos-15-intel, macos-latest, windows-latest]
        include:
          - os: ubuntu-22.04
            artifact_name: linux-artifact
            artifact_filename: stump_server
          - os: macos-15-intel
            artifact_name: macos-intel-artifact
            artifact_filename: stump_server
          - os: macos-latest
            artifact_name: macos-arm-artifact
            artifact_filename: stump_server
          - os: windows-latest
            artifact_name: windows-artifact
            artifact_filename: stump_server.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build stump server
        uses: ./.github/actions/build-server

      - name: Copy bundled web app
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: webapp
          path: ./staging/client

      - name: Prepare artifact
        run: mv target/release/${{ matrix.artifact_filename }} ./staging/${{ matrix.artifact_filename }}

      - name: Upload server artifact
        uses: ./.github/actions/upload-artifact
        with:
          upload-name: ${{ matrix.artifact_name }}
          upload-path: staging

  # create the release and attach the platform artifacts
  create-release:
    needs: [resolve-version, build-binary]
    runs-on: ubuntu-22.04
    permissions: write-all
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifact (Linux)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: linux-artifact
          path: StumpServer-linux

      - name: Download artifact (macOS Intel)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: macos-intel-artifact
          path: StumpServer-macos-intel

      - name: Download artifact (macOS ARM)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: macos-arm-artifact
          path: StumpServer-macos-arm

      - name: Download artifact (Windows)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-artifact
          path: StumpServer-windows

      - name: Install dependencies
        run: sudo apt-get install -y gh zip

      - name: Zip artifacts
        run: |
          cd StumpServer-linux && zip -r ../linux-build-results.zip * && cd ..
          cd StumpServer-macos-intel && zip -r ../macos-intel-build-results.zip * && cd ..
          cd StumpServer-macos-arm && zip -r ../macos-arm-build-results.zip * && cd ..
          cd StumpServer-windows && zip -r ../windows-build-results.zip * && cd ..

      - name: Create release and upload artifacts
        run: |
          gh release create v$VERSION \
            --draft \
            --target main \
            --title "v$VERSION" \
            --generate-notes \
            linux-build-results.zip#StumpServer-$VERSION-linux-x86_64.zip \
            macos-intel-build-results.zip#StumpServer-$VERSION-macos-intel.zip \
            macos-arm-build-results.zip#StumpServer-$VERSION-macos-arm.zip \
            windows-build-results.zip#StumpServer-$VERSION-windows-x86_64.zip
