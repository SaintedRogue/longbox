name: Setup system dependencies
description: Install system dependencies and setup cache

inputs:
  cache-dependencies:
    description: 'Cache dependencies'
    required: false
    default: 'true'

  cache-locality:
    description: 'The locality of the cache, e.g. either local build or docker build'
    required: false
    default: 'local' # 'local' or 'docker'

runs:
  using: composite
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: 1.92.0
        components: rustfmt, clippy

    # Self-hosted runners aren't pre-provisioned like GitHub-hosted ones, so the
    # system-setup step below is skipped for them. Install the C build deps the
    # crates need (openssl, sqlite, etc.) directly — matches the Dockerfile builder.
    - name: Install system build dependencies (self-hosted Linux)
      if: ${{ runner.environment == 'self-hosted' && runner.os == 'Linux' }}
      shell: bash
      run: |
        export DEBIAN_FRONTEND=noninteractive
        SUDO=""
        command -v sudo >/dev/null 2>&1 && SUDO=sudo
        $SUDO apt-get update
        $SUDO apt-get install -y --no-install-recommends \
          build-essential gcc-10 g++-10 cmake pkg-config libssl-dev libsqlite3-dev
        # The runner's default gcc 9 is rejected by aws-lc-sys (GCC bug #95189,
        # fixed in gcc 10) and its toolchain also breaks unrar-sys. Use gcc-10/g++-10
        # for all C/C++ deps — clears that check and keeps C++ on libstdc++ (present),
        # matching the Dockerfile builder.
        echo "CC=gcc-10" >> "$GITHUB_ENV"
        echo "CXX=g++-10" >> "$GITHUB_ENV"

    - name: Configure environment
      if: ${{ runner.environment != 'self-hosted' && runner.os != 'Windows' }}
      shell: bash
      run: CHECK_NODE=0 CHECK_CARGO=0 DEV_SETUP=0 ./scripts/system-setup.sh

    # See https://github.com/Swatinem/rust-cache/issues/194
    - name: Cache Rust Dependencies
      if: ${{ inputs.cache-dependencies == 'true' }}
      uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      with:
        shared-key: longbox-rust-cache
