name: Coverage CI
description: Run code coverage checks

inputs:
  token:
    description: 'Codecov token'
    required: true
  cache-dependencies:
    description: 'Whether to cache dependencies'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup rust
      uses: ./.github/actions/setup-rust
      with:
        cache-dependencies: ${{ inputs.cache-dependencies }}

    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov
      shell: bash

    - name: Generate code coverage data
      shell: bash
      run: cargo llvm-cov --no-cfg-coverage --all-features --workspace --lcov --output-path lcov.info

    # Only upload from GitHub-hosted runners. The self-hosted runner (Ubuntu 20.04)
    # ships an old curl/gpg that breaks the Codecov CLI's signature verification — and
    # we will NOT disable that verification (supply-chain integrity). Coverage is still
    # generated above; uploading the result to the external service is optional.
    - name: Upload coverage to Codecov
      if: ${{ runner.environment != 'self-hosted' }}
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
      with:
        token: ${{ inputs.token }}
        files: lcov.info
        fail_ci_if_error: false
